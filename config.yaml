app:
  name: redteam-agent
  log_level: INFO
  offline_mode: true
  checkpoint_dir: ./.checkpoints
  reports_dir: ./reports

llm:
  base_url: http://localhost:11434/v1
  api_key: ollama
  planner_model: qwen2.5-coder:32b
  analyzer_model: qwen2.5-coder:32b
  embed_model: nomic-embed-text
  timeout_seconds: 120
  max_retries: 3

memory:
  vector_store:
    provider: chromadb
    persist_dir: ./.memory/chroma
    collection: redteam-knowledge
  tactical_sqlite_path: ./.memory/tactical.db
  max_context_items: 15

world_model:
  sqlite_path: ./.state/world_model.db
  graphml_path: ./.state/world_model.graphml

decision_engine:
  monte_carlo_iterations: 200
  confidence_threshold: 0.65
  exploration_rate: 0.15
  adaptive_learning_rate: 0.08
  criteria_weights:
    success_probability: 0.30
    stealth: 0.20
    impact: 0.20
    speed: 0.10
    reversibility: 0.10
    evidence_value: 0.10

docker:
  image: kalilinux/kali-rolling:latest
  network_name: redteam_isolated_net
  cpu_quota: 100000
  mem_limit: 2g
  pids_limit: 256
  default_timeout: 600
  snapshots_dir: ./.snapshots
  volumes:
    - ./artifacts:/artifacts:rw

tools:
  metasploit:
    enabled: true
    host: 127.0.0.1
    port: 55553
    user: msf
    password: msf
    ssl: false
  nmap:
    timing: T3
    default_ports: "1-1000"

engagement:
  target_scope:
    - 192.168.56.0/24
  forbidden_actions:
    - destructive_data_loss
    - ransomware_simulation
  snapshot_before_risky_actions: true
